<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Camino a Madrid</title>
<meta name="description" content="Rastreador diario de práctica de español — camino a Madrid, enero 2027.">
<meta name="theme-color" content="#00819e" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a19" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Madrid">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%2300819e'/%3E%3Ctext x='50' y='66' font-size='54' text-anchor='middle' fill='white' font-family='sans-serif'%3EM%3C/text%3E%3C/svg%3E">
<style>
  /* ============================================================
     DESIGN TOKENS
     Madrid Metro design language. Light/dark aware.
     Phase colors validated for WCAG contrast — see README/PLAN
     notes in the build report for details (validator script in
     the dataviz skill requires Node, unavailable in this
     environment; contrast ratios below were computed manually
     with the WCAG relative-luminance formula and checked against
     the skill's documented lightness/contrast bands).
     ============================================================ */
  :root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --surface-2:      #f9f9f7;
    --surface-3:      #f1f0ec;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);

    /* Phase (categorical, fixed order 1-2-3, reserved meaning) */
    --phase1:      #00819e; /* Línea 1 — accessible light blue */
    --phase1-ink:  #ffffff;
    --phase2:      #E0292F; /* Línea 2 — accessible red */
    --phase2-ink:  #ffffff;
    --phase3:      #9c6a00; /* Línea 3 — accessible amber/gold */
    --phase3-ink:  #ffffff;

    /* Status (reserved, never reused for series identity) */
    --status-good:  #0ca30c;
    --status-gold:  #9c6a00;
    --status-neutral-fill: #b9c4cc;

    /* Sequential heatmap ramp (single hue: blue), light -> dark = more minutes */
    --heat-0:  #ecebe7;
    --heat-1:  #b7d3f6;
    --heat-2:  #5598e7;
    --heat-3:  #184f95;

    --radius: 14px;
    --tap: 44px;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --surface-2:      #161615;
      --surface-3:      #232320;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.12);

      --phase1:      #3DC7F1;
      --phase1-ink:  #0b0b0b;
      --phase2:      #EB6A6E;
      --phase2-ink:  #0b0b0b;
      --phase3:      #E0A030;
      --phase3-ink:  #0b0b0b;

      --status-good:  #0ca30c;
      --status-gold:  #E0A030;
      --status-neutral-fill: #4a545c;

      --heat-0:  #23231f;
      --heat-1:  #184f95;
      --heat-2:  #5598e7;
      --heat-3:  #b7d3f6;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --surface-2:      #161615;
    --surface-3:      #232320;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --baseline:       #383835;
    --border:         rgba(255,255,255,0.12);

    --phase1:      #3DC7F1;
    --phase1-ink:  #0b0b0b;
    --phase2:      #EB6A6E;
    --phase2-ink:  #0b0b0b;
    --phase3:      #E0A030;
    --phase3-ink:  #0b0b0b;

    --status-good:  #0ca30c;
    --status-gold:  #E0A030;
    --status-neutral-fill: #4a545c;

    --heat-0:  #23231f;
    --heat-1:  #184f95;
    --heat-2:  #5598e7;
    --heat-3:  #b7d3f6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--surface-2);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
    padding-bottom: 48px;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 14px;
  }
  a { color: var(--phase1); }

  /* ---------- Header ---------- */
  header.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px 6px;
    max-width: 640px;
    margin: 0 auto;
  }
  header.app-header h1 {
    font-size: 1.25rem;
    margin: 0;
    letter-spacing: -0.01em;
  }
  header.app-header h1 .sub {
    display: block;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-muted);
  }
  button.icon-btn {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: var(--tap);
    height: var(--tap);
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  button.icon-btn:active { transform: scale(0.94); }

  /* ---------- Banners ---------- */
  .banner {
    margin: 8px 14px;
    max-width: 612px;
    margin-left: auto;
    margin-right: auto;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 0.85rem;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    justify-content: space-between;
  }
  .banner-red   { background: #fdeceb; color: #7a1414; border: 1px solid #e0292f; }
  .banner-amber { background: #fdf3df; color: #6b4a00; border: 1px solid #c98500; }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .banner-red   { background: #3a1616; color: #ff9d9d; border-color: #e66767; }
    :root:where(:not([data-theme="light"])) .banner-amber { background: #332a10; color: #ffd479; border-color: #c98500; }
  }
  :root[data-theme="dark"] .banner-red   { background: #3a1616; color: #ff9d9d; border-color: #e66767; }
  :root[data-theme="dark"] .banner-amber { background: #332a10; color: #ffd479; border-color: #c98500; }
  .banner button.dismiss {
    background: none; border: none; font-size: 1rem; cursor: pointer; color: inherit;
    line-height: 1; padding: 2px 4px;
  }
  .banner strong { display:block; margin-bottom: 2px; }

  /* ---------- Cards ---------- */
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 14px 0;
  }
  .card h2 {
    font-size: 0.95rem;
    margin: 0 0 10px;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* ---------- Metro hero ---------- */
  .metro-scroll {
    overflow-x: auto;
    padding: 18px 6px 6px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .metro-line {
    position: relative;
    display: flex;
    align-items: center;
    min-width: max-content;
    padding: 0 20px;
  }
  .metro-line::before {
    content: "";
    position: absolute;
    left: 20px; right: 20px; top: 50%;
    height: 4px;
    transform: translateY(-50%);
    background: var(--gridline);
    z-index: 0;
    border-radius: 2px;
  }
  .station {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30px;
    flex: 0 0 30px;
  }
  .station .dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--surface-1);
    box-shadow: 0 0 0 1px var(--border);
  }
  .station.interchange .dot {
    width: 18px; height: 18px;
    box-shadow: 0 0 0 2px var(--surface-1), 0 0 0 4px currentColor;
  }
  .station.current .dot {
    width: 24px; height: 24px;
    box-shadow: 0 0 0 3px var(--surface-1), 0 0 0 5px currentColor;
    animation: pulse 2.2s ease-in-out infinite;
  }
  .station.future .dot { opacity: 0.35; }
  @media (prefers-reduced-motion: reduce) {
    .station.current .dot { animation: none; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .station .wk-num {
    font-size: 0.55rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .station.terminus .wk-num {
    font-weight: 700;
    color: var(--text-primary);
    font-size: 0.6rem;
  }
  .metro-caption {
    font-size: 0.85rem;
    color: var(--text-secondary);
    padding: 2px 6px 0;
    text-align: center;
  }
  .phase-legend {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    font-size: 0.72rem;
    color: var(--text-secondary);
    padding: 10px 6px 0;
  }
  .phase-legend .item { display: flex; align-items: center; gap: 5px; }
  .phase-legend .swatch { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }

  /* ---------- Today card ---------- */
  .today-kind {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .prompt-es { font-size: 1.15rem; font-weight: 500; margin: 6px 0 2px; }
  .prompt-frases { font-size: 0.82rem; color: var(--text-muted); margin: 0 0 8px; font-style: italic; }
  .prompt-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .otro-link {
    background: none; border: none; color: var(--phase1); text-decoration: none;
    font-size: 0.82rem; cursor: pointer; white-space: nowrap; padding: 6px 2px;
    min-height: var(--tap); display:flex; align-items:center;
  }

  .day-instruction {
    font-size: 0.85rem; color: var(--text-muted);
    margin: 8px 0 0; line-height: 1.45;
  }
  .cuatro-timer {
    display: flex; align-items: center; gap: 12px;
    margin-top: 12px; padding: 10px 12px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px;
  }
  .cuatro-round { flex: 1; font-size: 0.8rem; color: var(--text-muted); }
  .cuatro-clock { font-size: 1.4rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cuatro-btn {
    min-height: var(--tap); padding: 0 14px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--phase3); color: #fff;
    font: inherit; font-weight: 600; font-size: 0.85rem; cursor: pointer;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    margin-top: 10px;
    cursor: pointer;
    text-align: left;
    color: var(--text-primary);
    font: inherit;
    min-height: var(--tap);
  }
  .task-row.done {
    border-color: var(--status-good);
    background: color-mix(in srgb, var(--status-good) 12%, var(--surface-2));
  }
  .task-check {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--baseline);
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: var(--surface-1);
  }
  .task-row.done .task-check {
    background: var(--status-good);
    border-color: var(--status-good);
  }
  .task-label { flex: 1; font-size: 0.92rem; }
  .task-label small { display:block; color: var(--text-muted); font-size: 0.72rem; }
  .task-open {
    flex: 0 0 auto; font-size: 0.82rem; font-weight: 600;
    text-decoration: none; white-space: nowrap;
    min-height: var(--tap); display: flex; align-items: center; padding: 0 4px;
    background: none; border: none; color: var(--phase1); font-family: inherit; cursor: pointer;
  }
  .minimo-link {
    display: block; width: 100%; margin-top: 12px; text-align: center;
    background: none; border: none; cursor: pointer; font: inherit;
    font-size: 0.8rem; color: var(--text-muted); min-height: var(--tap);
  }
  .minimo-link.done { color: var(--status-good); font-weight: 600; }

  .stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
  }
  .stepper button {
    width: var(--tap); height: var(--tap);
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-primary);
  }
  .stepper button:active { transform: scale(0.94); }
  .stepper .today-total {
    min-width: 70px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .stepper .today-total small { display:block; font-size: 0.65rem; font-weight: 400; color: var(--text-muted); }

  .weekend-hint {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* ---------- Weekly meter ---------- */
  .meter-track {
    position: relative;
    height: 26px;
    border-radius: 13px;
    background: var(--surface-3);
    overflow: hidden;
    margin-top: 6px;
  }
  .meter-fill {
    height: 100%;
    border-radius: 13px;
    background: var(--status-neutral-fill);
    transition: width 0.3s ease, background-color 0.3s ease;
  }
  .meter-fill.good { background: var(--status-good); }
  .meter-fill.gold { background: var(--status-gold); }
  .meter-tick {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--text-primary);
    opacity: 0.35;
  }
  .meter-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .meter-total {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 2px;
  }

  /* ---------- Heatmap ---------- */
  .heatmap-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .heatmap-grid {
    display: flex;
    gap: 3px;
    min-width: max-content;
    padding: 2px 2px 2px 10px;
  }
  .heatmap-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }
  .heatmap-col.phase-edge { margin-left: 7px; }
  .heatmap-col.phase-edge::before {
    content: "";
    position: absolute;
    left: -5px; top: 0; bottom: 0;
    width: 2px;
    background: var(--text-primary);
    opacity: 0.35;
    border-radius: 1px;
  }
  .heat-cell {
    width: 13px; height: 13px;
    border-radius: 3px;
    border: none;
    padding: 0;
    cursor: pointer;
    background: var(--heat-0);
  }
  .heat-cell.lvl1 { background: var(--heat-1); }
  .heat-cell.lvl2 { background: var(--heat-2); }
  .heat-cell.lvl3 { background: var(--heat-3); }
  .heat-cell.future { opacity: 0.3; cursor: default; }
  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .heatmap-legend .heat-cell { cursor: default; width: 11px; height: 11px; }
  .heat-detail {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    min-height: 1.2em;
  }

  /* ---------- Settings drawer ---------- */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 40; display: none;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(360px, 90vw);
    background: var(--surface-1);
    z-index: 41;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
    padding: 16px;
    box-shadow: -4px 0 20px rgba(0,0,0,0.2);
  }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { font-size: 1.05rem; margin-top: 0; }
  .drawer label { display:block; font-size: 0.8rem; color: var(--text-secondary); margin: 12px 0 4px; }
  .drawer input[type=text], .drawer input[type=password] {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text-primary); font-size: 0.9rem;
    min-height: var(--tap);
  }
  .drawer button.primary {
    margin-top: 14px; width: 100%; padding: 11px; border-radius: 10px; border: none;
    background: var(--phase1); color: var(--phase1-ink); font-weight: 600; font-size: 0.9rem;
    cursor: pointer; min-height: var(--tap);
  }
  .drawer button.secondary {
    margin-top: 8px; width: 100%; padding: 11px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface-2); color: var(--text-primary);
    font-weight: 600; font-size: 0.9rem; cursor: pointer; min-height: var(--tap);
  }
  .drawer .close-x {
    position: absolute; top: 10px; right: 10px;
  }
  .drawer .sync-status { font-size: 0.78rem; color: var(--text-muted); margin-top: 10px; white-space: pre-wrap; }
  .drawer hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .drawer .file-import { font-size: 0.82rem; }

  /* ---------- SRS flashcard reviewer overlay ---------- */
  .srs-overlay {
    position: fixed; inset: 0; background: var(--surface-1);
    z-index: 45; display: none; flex-direction: column;
  }
  .srs-overlay.open { display: flex; }
  .srs-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border); flex: 0 0 auto;
  }
  .srs-counter {
    font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .srs-body {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px 18px; text-align: center;
    overflow-y: auto;
  }
  .srs-front { font-size: 1.5rem; font-weight: 600; margin: 0 0 8px; max-width: 480px; }
  .srs-back { font-size: 1.35rem; font-weight: 600; margin: 20px 0 4px; color: var(--phase1); max-width: 480px; }
  .srs-extra { font-size: 0.9rem; color: var(--text-muted); margin: 0 0 22px; max-width: 480px; }
  .srs-show-btn {
    margin-top: 26px; min-height: var(--tap); padding: 0 30px; border-radius: 999px;
    border: none; background: var(--phase1); color: var(--phase1-ink);
    font: inherit; font-weight: 600; font-size: 1rem; cursor: pointer;
  }
  .srs-show-btn:active { transform: scale(0.96); }
  .srs-grades {
    display: flex; gap: 10px; width: 100%; max-width: 420px; margin-top: 12px;
  }
  .srs-grade-btn {
    flex: 1; min-height: var(--tap); border-radius: 12px; border: 1px solid var(--border);
    font: inherit; font-weight: 700; font-size: 0.92rem; cursor: pointer; padding: 10px 4px;
  }
  .srs-grade-btn:active { transform: scale(0.96); }
  /* Otra vez: muted red tint, same validated colors as .banner-red */
  .srs-grade-again { background: #fdeceb; color: #7a1414; border-color: #e0292f; }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .srs-grade-again { background: #3a1616; color: #ff9d9d; border-color: #e66767; }
  }
  :root[data-theme="dark"] .srs-grade-again { background: #3a1616; color: #ff9d9d; border-color: #e66767; }
  /* Bien: primary phase color (same pairing as .drawer button.primary) */
  .srs-grade-good { background: var(--phase1); color: var(--phase1-ink); border-color: transparent; }
  /* Fácil: --status-good background; dark ink (not white) for AA contrast —
     status-good's luminance is too high for white text at this font weight/size. */
  .srs-grade-easy { background: var(--status-good); color: #0b0b0b; border-color: transparent; }
  .srs-done .big { font-size: 2.2rem; font-weight: 700; margin: 10px 0; }
  .srs-done p { color: var(--text-secondary); }
  .srs-done-close {
    margin-top: 22px; min-height: var(--tap); padding: 0 32px; border-radius: 999px;
    border: none; background: var(--phase1); color: var(--phase1-ink);
    font: inherit; font-weight: 600; font-size: 1rem; cursor: pointer;
  }

  /* ---------- Countdown / completed states ---------- */
  .state-screen {
    text-align: center;
    padding: 40px 14px;
  }
  .state-screen .big { font-size: 2.4rem; font-weight: 700; margin: 10px 0; }
  .state-screen p { color: var(--text-secondary); }

  .error-banner-fatal {
    background: #e0292f; color: #fff; padding: 14px; text-align: center;
    font-weight: 700; position: sticky; top: 0; z-index: 50;
  }
  .visually-hidden {
    position: absolute; width: 1px; height: 1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap;
  }
  footer.app-footer {
    text-align: center; font-size: 0.72rem; color: var(--text-muted); padding: 20px 14px 4px;
  }
</style>
</head>
<body>

<div id="fatalBanner"></div>

<header class="app-header">
  <h1>Camino a Madrid<span class="sub">Enero 2027</span></h1>
  <button class="icon-btn" id="settingsBtn" aria-label="Ajustes" title="Ajustes">⚙️</button>
</header>

<div id="banners"></div>

<main class="wrap" id="mainContent"></main>

<footer class="app-footer">Camino a Madrid · práctica diaria de español</footer>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer" aria-hidden="true">
  <button class="icon-btn close-x" id="drawerClose" aria-label="Cerrar ajustes">✕</button>
  <h2>Ajustes</h2>

  <label for="patInput">Token de GitHub</label>
  <input type="password" id="patInput" placeholder="github_pat_…" autocomplete="off">

  <label for="ownerInput">Usuario de GitHub</label>
  <input type="text" id="ownerInput" placeholder="p.ej. alexfu29">

  <label for="repoInput">Repositorio</label>
  <input type="text" id="repoInput" placeholder="camino-a-madrid">

  <button class="primary" id="saveSettingsBtn">Guardar ajustes</button>
  <button class="secondary" id="testSyncBtn">Probar sincronización</button>
  <div class="sync-status" id="syncStatus"></div>

  <hr>
  <div class="file-import">
    <p style="margin:0 0 8px;color:var(--text-secondary)">Copia de seguridad sin token:</p>
    <button class="secondary" id="exportBtn">Exportar JSON</button>
    <label for="importInput" style="margin-top:10px">Importar JSON</label>
    <input type="file" id="importInput" accept="application/json">
  </div>
  <hr>
  <p style="font-size:0.72rem;color:var(--text-muted)">
    El token se guarda solo en este dispositivo (localStorage). Nunca se envía a nadie más que a GitHub.
  </p>
</div>

<div class="srs-overlay" id="srsOverlay" aria-hidden="true">
  <div class="srs-top">
    <span class="srs-counter" id="srsCounter"></span>
    <button class="icon-btn" id="srsCloseBtn" aria-label="Cerrar repaso">✕</button>
  </div>
  <div class="srs-body" id="srsBody"></div>
</div>

<script src="prompts.js"></script>
<script src="cards.js"></script>
<script>
(function () {
  "use strict";

  /* ============================================================
     0. FATAL-ERROR HANDLING FOR prompts.js
     ============================================================ */
  // Deviation (documented): showFatal() now accumulates messages instead of
  // overwriting, so prompts.js and cards.js can each fail independently and
  // both loud banners stay visible at once.
  var fatalMsgs = [];
  function showFatal(msg) {
    fatalMsgs.push(msg);
    var html = "";
    for (var i = 0; i < fatalMsgs.length; i++) {
      html += '<div class="error-banner-fatal">⚠ ' + fatalMsgs[i] + '</div>';
    }
    document.getElementById("fatalBanner").innerHTML = html;
  }

  var PROMPTS_OK = true;
  if (typeof PROMPTS === "undefined" || !Array.isArray(PROMPTS) || PROMPTS.length === 0) {
    showFatal("Error: no se pudieron cargar las frases de práctica (prompts.js).");
    PROMPTS_OK = false;
  }

  var CARDS_OK = true;
  if (typeof CARDS === "undefined" || !Array.isArray(CARDS) || CARDS.length !== 90) {
    showFatal("Error: no se pudieron cargar las tarjetas (cards.js).");
    CARDS_OK = false;
  }

  /* ============================================================
     1. TIMELINE CONSTANTS
     All date logic runs in the user's local timezone using
     plain Date objects at local midnight (never UTC / ISO-Z).
     ============================================================ */
  var START_DATE = new Date(2026, 6, 17); // 2026-07-17 (Fri) — program start
  var END_DATE   = new Date(2026, 11, 31); // 2026-12-31 (Thu) — program end
  var PHASE1_END = new Date(2026, 7, 31);  // 2026-08-31 inclusive
  var PHASE2_END = new Date(2026, 9, 31);  // 2026-10-31 inclusive
  var TOTAL_WEEKS = 24;

  // Monday on/before START_DATE — the grid's week-0 anchor.
  // NOTE (deviation, documented): weeks are standard Monday-Sunday
  // calendar weeks anchored here. 24 such weeks run 2026-07-13 ->
  // 2026-12-27; the trailing 2026-12-28..12-31 (Mon-Thu) is folded
  // into week 24 for display/logging so the hero keeps exactly 24
  // stations. See README/build notes.
  function mondayOnOrBefore(d) {
    var day = d.getDay(); // 0=Sun..6=Sat
    var diff = (day === 0) ? 6 : day - 1;
    return addDays(d, -diff);
  }
  var WEEK0_MONDAY = mondayOnOrBefore(START_DATE);

  function addDays(d, n) {
    var r = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    r.setDate(r.getDate() + n);
    return r;
  }
  function atMidnight(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function isoDate(d) {
    var y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
    return y + "-" + String(m).padStart(2, "0") + "-" + String(day).padStart(2, "0");
  }
  function daysBetween(a, b) {
    return Math.round((atMidnight(b) - atMidnight(a)) / 86400000);
  }
  function daysSinceEpoch(d) {
    // days since Unix epoch, local calendar date
    return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000);
  }

  function phaseOfDate(d) {
    if (d <= PHASE1_END) return 1;
    if (d <= PHASE2_END) return 2;
    return 3;
  }
  var PHASE_NAMES = { 1: "Reinicio", 2: "Expansión", 3: "Simulación Madrid" };

  // week index (0-based) for a given date, clamped into [0, TOTAL_WEEKS-1]
  function weekIndexOf(d) {
    var idx = Math.floor(daysBetween(WEEK0_MONDAY, d) / 7);
    if (idx < 0) idx = 0;
    if (idx > TOTAL_WEEKS - 1) idx = TOTAL_WEEKS - 1;
    return idx;
  }
  // representative phase of a week (its Thursday) for hero coloring
  function weekPhase(weekIdx) {
    var thursday = addDays(WEEK0_MONDAY, weekIdx * 7 + 3);
    return phaseOfDate(thursday);
  }

  var today = atMidnight(new Date());
  // Debug: ?d=2026-09-15 renders the app as if it were that date (local).
  var dOverride = new URLSearchParams(location.search).get("d");
  if (dOverride && /^\d{4}-\d{2}-\d{2}$/.test(dOverride)) {
    today = atMidnight(new Date(dOverride + "T12:00:00"));
  }

  /* ============================================================
     2. STORAGE / DATA MODEL
     ============================================================ */
  var DATA_KEY = "camino-data";
  var PAT_KEY = "camino-pat";
  var SETTINGS_KEY = "camino-settings";

  function emptyData() {
    return {
      version: 1, updated: new Date().toISOString(), days: {},
      srs: {}, srsNew: { date: null, count: 0 }
    };
  }
  function loadData() {
    try {
      var raw = localStorage.getItem(DATA_KEY);
      if (!raw) return emptyData();
      var parsed = JSON.parse(raw);
      if (!parsed.days) parsed.days = {};
      if (!parsed.srs) parsed.srs = {}; // tolerate old data with no SRS state yet
      if (!parsed.srsNew) parsed.srsNew = { date: null, count: 0 };
      return parsed;
    } catch (e) {
      return emptyData();
    }
  }
  function saveData(data) {
    data.updated = new Date().toISOString();
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
    scheduleSync();
  }
  var DATA = loadData();

  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
  var SETTINGS = loadSettings();

  function getPAT() { return localStorage.getItem(PAT_KEY) || ""; }
  function setPAT(v) {
    if (v) localStorage.setItem(PAT_KEY, v);
    else localStorage.removeItem(PAT_KEY);
  }

  function detectOwnerRepo() {
    var host = location.hostname;
    if (host.endsWith(".github.io")) {
      var owner = host.split(".")[0];
      var parts = location.pathname.split("/").filter(Boolean);
      var repo = parts.length ? parts[0] : "";
      return { owner: owner, repo: repo };
    }
    return { owner: SETTINGS.owner || "", repo: SETTINGS.repo || "" };
  }

  /* ============================================================
     3. BANNERS
     ============================================================ */
  var bannersEl = document.getElementById("banners");
  var sessionDismissed = {};

  function renderBanners() {
    var html = "";
    if (redBannerMsg) {
      // Deliberately NOT dismissible (unlike the amber banner): the spec calls
      // for a persistent red banner on sync failure. It only clears when a
      // sync call actually succeeds (see clearRedBanner()).
      html += '<div class="banner banner-red" role="alert"><div><strong>Error de sincronización</strong>' +
        escapeHtml(redBannerMsg) + '</div></div>';
    }
    if (!getPAT() && !sessionDismissed.amber) {
      html += '<div class="banner banner-amber"><div><strong>Sin sincronizar</strong>añade un token en ajustes' +
        ' para sincronizar entre dispositivos.</div><button class="dismiss" data-dismiss="amber">✕</button></div>';
    }
    bannersEl.innerHTML = html;
    bannersEl.querySelectorAll("[data-dismiss]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var kind = btn.getAttribute("data-dismiss");
        if (kind === "amber") sessionDismissed.amber = true;
        renderBanners();
      });
    });
  }
  var redBannerMsg = null;
  function setRedBanner(msg) { redBannerMsg = msg; renderBanners(); }
  function clearRedBanner() { redBannerMsg = null; renderBanners(); }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  /* ============================================================
     4. PROMPT SELECTION
     ============================================================ */
  function offsetKeyFor(dateStr) { return "camino-offset-" + dateStr; }
  function getOffset(dateStr) {
    var v = localStorage.getItem(offsetKeyFor(dateStr));
    return v ? parseInt(v, 10) || 0 : 0;
  }
  function bumpOffset(dateStr) {
    var v = getOffset(dateStr) + 1;
    localStorage.setItem(offsetKeyFor(dateStr), String(v));
    return v;
  }

  /* Weekly template balancing Nation's four strands in ~15-20'/day:
     output (Mon/Thu/Sat), input at natural speed (Tue), fluency
     development (Wed 4/3/2, Fri shadowing), daily flashcards = study strand. */
  var DAY_PLANS = {
    1: { kind: "voice", badge: "8′ conversación — Claude voz", task: "Hablar 8′", min: 8,
         promptKind: "voice", color: "var(--phase1)", href: "claude",
         hint: "Claude voz — al abrirse, toca el micro" },
    2: { kind: "listen", badge: "10′ oído — Hoy Hablamos", task: "Escuchar 10′", min: 10,
         promptKind: null, color: "var(--phase2)",
         href: "https://open.spotify.com/show/1puKUN2oF1M5DMt8o4M1bA",
         hint: "episodio de hoy, velocidad normal",
         instruction: "Pon el episodio de hoy a velocidad normal — nada de audio lento. ¿Fácil? Sube a 1.25×. No hace falta entenderlo todo: estás entrenando la velocidad del oído." },
    3: { kind: "cuatro", badge: "9′ fluidez — técnica 4/3/2", task: "Contar 3 veces 9′", min: 9,
         promptKind: "voice", color: "var(--phase3)", timer: true,
         hint: "el mismo tema, 3 rondas cada vez más cortas",
         instruction: "Cuenta este tema en voz alta 3 veces: 4, luego 3, luego 2 minutos. El mismo contenido en menos tiempo — así se automatiza la fluidez." },
    4: { kind: "gliglish", badge: "8′ roleplay — Gliglish", task: "Roleplay 8′", min: 8,
         promptKind: "gliglish", color: "var(--phase2)", href: "https://gliglish.com",
         hint: 'Gliglish — elige "Spanish (Spain)"' },
    5: { kind: "shadow", badge: "8′ shadowing — Español con Juan", task: "Shadowing 8′", min: 8,
         promptKind: null, color: "var(--phase3)",
         href: "https://www.youtube.com/@EspanolconJuan/videos",
         hint: "repite en voz alta a la vez que el vídeo",
         instruction: "Elige ~1 minuto de un vídeo. Escúchalo una vez. Después repítelo en voz alta A LA VEZ que habla, 3 pasadas. Imita el ritmo y la entonación, no solo las palabras." },
    6: { kind: "voice", badge: "Día libre — conversación o recuperación", task: "Hablar 8′", min: 8,
         promptKind: "voice", color: "var(--text-muted)", href: "claude",
         hint: "Claude voz — al abrirse, toca el micro" },
    0: { kind: "voice", badge: "Descanso — o día mínimo", task: "Hablar 8′", min: 8,
         promptKind: "voice", color: "var(--text-muted)", href: "claude",
         hint: "Claude voz — al abrirse, toca el micro" }
  };
  function todaysPlan(dow) { return DAY_PLANS[dow]; }

  function pickTodaysPrompt() {
    if (!PROMPTS_OK) return null;
    var phase = phaseOfDate(today);
    var dow = today.getDay();
    var kind = todaysPlan(dow).promptKind;
    if (!kind) return null; // listening/shadowing days carry instructions, not prompts
    var subset;
    try {
      subset = PROMPTS.filter(function (p) { return p && p.phase === phase && p.kind === kind; });
    } catch (e) {
      showFatal("Error al filtrar las frases de práctica (prompts.js).");
      return null;
    }
    if (subset.length === 0) {
      showFatal("No hay frases (\"prompts\") para la Fase " + phase + " / tipo \"" + kind + "\" — revisa prompts.js.");
      return null;
    }
    // stable deterministic sort
    var indexed = subset.map(function (p, i) { return { p: p, i: i }; });
    indexed.sort(function (a, b) {
      if (a.p.es < b.p.es) return -1;
      if (a.p.es > b.p.es) return 1;
      return a.i - b.i;
    });
    var sorted = indexed.map(function (x) { return x.p; });
    var dateStr = isoDate(today);
    var offset = getOffset(dateStr);
    var idx = ((daysSinceEpoch(today) + offset) % sorted.length + sorted.length) % sorted.length;
    return { prompt: sorted[idx], kind: kind, dateStr: dateStr };
  }

  /* ============================================================
     5. WEEK / TASK LOGIC
     ============================================================ */
  function dayEntry(dateStr) {
    return DATA.days[dateStr] || { min: 0, tasks: [], kind: null };
  }
  function setDayEntry(dateStr, entry) {
    if (entry.min <= 0 && entry.tasks.length === 0) {
      delete DATA.days[dateStr];
    } else {
      DATA.days[dateStr] = entry;
    }
    saveData(DATA);
  }

  // Shared toggle logic for speak/anki/minimo, used both by the manual task
  // rows (renderToday) and by the SRS reviewer's auto-mark-done-on-finish
  // (so both paths get identical mutual-exclusion + minute bookkeeping).
  function applyTaskToggle(dateStr, kind, taskName) {
    var e = dayEntry(dateStr);
    e.tasks = e.tasks || [];
    e.kind = kind;
    if (taskName === "minimo") {
      // mutually exclusive with speak/anki
      var wasOn = e.tasks.indexOf("minimo") > -1;
      var removedMin = 0;
      ["speak", "anki"].forEach(function (t) {
        if (e.tasks.indexOf(t) > -1) removedMin += TASK_MIN[t];
      });
      e.tasks = e.tasks.filter(function (t) { return t !== "speak" && t !== "anki"; });
      e.min -= removedMin;
      if (wasOn) {
        e.tasks = e.tasks.filter(function (t) { return t !== "minimo"; });
        e.min -= TASK_MIN.minimo;
      } else {
        e.tasks.push("minimo");
        e.min += TASK_MIN.minimo;
      }
    } else {
      var idx = e.tasks.indexOf(taskName);
      // toggling speak/anki clears minimo (mutual exclusion)
      if (e.tasks.indexOf("minimo") > -1) {
        e.tasks = e.tasks.filter(function (t) { return t !== "minimo"; });
        e.min -= TASK_MIN.minimo;
      }
      if (idx > -1) {
        e.tasks.splice(idx, 1);
        e.min -= TASK_MIN[taskName];
      } else {
        e.tasks.push(taskName);
        e.min += TASK_MIN[taskName];
      }
    }
    if (e.min < 0) e.min = 0;
    setDayEntry(dateStr, e);
  }

  function weekTotalMinutes(weekIdx) {
    var monday = addDays(WEEK0_MONDAY, weekIdx * 7);
    var span = (weekIdx === TOTAL_WEEKS - 1) ? daysBetween(monday, END_DATE) + 1 : 7;
    var total = 0;
    for (var i = 0; i < span; i++) {
      var d = isoDate(addDays(monday, i));
      var e = DATA.days[d];
      if (e) total += (e.min || 0);
    }
    return total;
  }

  /* ============================================================
     6. RENDER: MAIN
     ============================================================ */
  var mainEl = document.getElementById("mainContent");

  function render() {
    if (today < atMidnight(START_DATE)) { renderCountdown(); return; }
    if (today > atMidnight(END_DATE)) { renderCompleted(); return; }
    renderNormal();
  }

  function renderCountdown() {
    var daysLeft = daysBetween(today, START_DATE);
    mainEl.innerHTML =
      '<div class="state-screen card">' +
      '<p>Tu camino a Madrid empieza pronto.</p>' +
      '<div class="big">' + daysLeft + '</div>' +
      '<p>día' + (daysLeft === 1 ? "" : "s") + ' para empezar (17 jul 2026)</p>' +
      '</div>';
  }

  function renderCompleted() {
    mainEl.innerHTML =
      '<div class="state-screen card">' +
      '<div class="big">🎉 ¡Ya estás en Madrid!</div>' +
      '<p>Programa de 24 semanas completado. Enhorabuena.</p>' +
      '</div>' +
      '<div class="card" id="heroCard"></div>' +
      '<div class="card" id="heatmapCard"></div>';
    renderHero(document.getElementById("heroCard"));
    renderHeatmap(document.getElementById("heatmapCard"));
  }

  function renderNormal() {
    mainEl.innerHTML =
      '<div class="card" id="heroCard"></div>' +
      '<div class="card" id="todayCard"></div>' +
      '<div class="card" id="meterCard"></div>' +
      '<div class="card" id="heatmapCard"></div>';
    renderHero(document.getElementById("heroCard"));
    renderToday(document.getElementById("todayCard"));
    renderMeter(document.getElementById("meterCard"));
    renderHeatmap(document.getElementById("heatmapCard"));
  }

  /* ---------- 6a. Metro hero ---------- */
  function renderHero(container) {
    var curWeek = weekIndexOf(today);
    var stationsHtml = "";
    for (var i = 0; i < TOTAL_WEEKS; i++) {
      var ph = weekPhase(i);
      var isInterchange = (i > 0 && weekPhase(i - 1) !== ph);
      var isCurrent = (i === curWeek);
      var isFuture = (i > curWeek);
      var isTerminus = (i === TOTAL_WEEKS - 1);
      var cls = ["station"];
      if (isInterchange) cls.push("interchange");
      if (isCurrent) cls.push("current");
      if (isFuture) cls.push("future");
      if (isTerminus) cls.push("terminus");
      var color = "var(--phase" + ph + ")";
      stationsHtml +=
        '<div class="' + cls.join(" ") + '" style="color:' + color + '" ' +
        'title="Semana ' + (i + 1) + " · Fase " + ph + '">' +
        '<div class="dot" style="background:' + color + '"></div>' +
        '<div class="wk-num">' + (isTerminus ? "MADRID" : (i + 1)) + '</div>' +
        '</div>';
    }
    container.innerHTML =
      '<div class="metro-scroll" id="metroScroll">' +
      '<div class="metro-line">' + stationsHtml + '</div>' +
      '</div>' +
      '<p class="metro-caption">Semana ' + (curWeek + 1) + ' de ' + TOTAL_WEEKS + ' · Fase ' +
        phaseOfDate(today) + ': ' + PHASE_NAMES[phaseOfDate(today)] + '</p>' +
      '<div class="phase-legend">' +
        '<span class="item"><span class="swatch" style="background:var(--phase1)"></span>Fase 1 · Reinicio</span>' +
        '<span class="item"><span class="swatch" style="background:var(--phase2)"></span>Fase 2 · Expansión</span>' +
        '<span class="item"><span class="swatch" style="background:var(--phase3)"></span>Fase 3 · Simulación Madrid</span>' +
      '</div>';
    // auto-center current station
    requestAnimationFrame(function () {
      var scroll = document.getElementById("metroScroll");
      var current = scroll.querySelector(".station.current");
      if (current && current.scrollIntoView) {
        current.scrollIntoView({ inline: "center", block: "nearest" });
      }
    });
  }

  /* ---------- 6b. Today card ---------- */
  var TASK_MIN = { speak: 8, anki: 5, minimo: 3 };

  function renderToday(container) {
    var dow = today.getDay();
    var dateStr = isoDate(today);
    var entry = dayEntry(dateStr);
    var plan = todaysPlan(dow);
    var kind = plan.kind;
    var isWeekend = (dow === 0 || dow === 6);
    TASK_MIN.speak = plan.min; // main task minutes vary by day

    var promptBlock = "";
    var picked = pickTodaysPrompt();
    if (picked) {
      promptBlock =
        '<div class="prompt-row">' +
          '<div>' +
            '<p class="prompt-es">' + escapeHtml(picked.prompt.es) + '</p>' +
            (picked.prompt.frases
              ? '<p class="prompt-frases">Intenta usar: ' + escapeHtml(picked.prompt.frases) + '</p>'
              : "") +
          '</div>' +
          '<button class="otro-link" id="otroBtn">otro →</button>' +
        '</div>';
    }
    if (plan.instruction) {
      promptBlock += '<p class="day-instruction">' + escapeHtml(plan.instruction) + '</p>';
    }
    if (plan.timer) {
      promptBlock +=
        '<div class="cuatro-timer" id="cuatroTimer">' +
          '<span class="cuatro-round" id="cuatroRound">Ronda 1 de 3 — 4:00</span>' +
          '<span class="cuatro-clock" id="cuatroClock">4:00</span>' +
          '<button class="cuatro-btn" id="cuatroBtn">Empezar</button>' +
        '</div>';
    }

    // One-tap launch target for the main task row. "claude" opens Claude with
    // the conversation pre-loaded (user then taps the mic once).
    var speakHref = plan.href;
    if (speakHref === "claude") {
      var claudeQ = "Practiquemos español hablado (castellano peninsular, nivel B1+). " +
        "Conversa conmigo sobre este tema, hazme preguntas de seguimiento, " +
        "corrige brevemente solo mis errores importantes y usa vosotros cuando sea natural. " +
        "Tema: " + (picked ? picked.prompt.es : "un tema que elijas tú.") +
        " Empieza tú con una primera pregunta.";
      speakHref = "https://claude.ai/new?q=" + encodeURIComponent(claudeQ);
    }
    var speakOpen = speakHref
      ? '<a class="task-open" href="' + speakHref + '" target="_blank" rel="noopener">abrir →</a>'
      : "";

    var speakDone = entry.tasks.indexOf("speak") > -1;
    var ankiDone = entry.tasks.indexOf("anki") > -1;
    var minimoDone = entry.tasks.indexOf("minimo") > -1;

    var weekIdx = weekIndexOf(today);
    var weekendHint = "";
    if (isWeekend) {
      var total = weekTotalMinutes(weekIdx);
      if (total < 60) {
        weekendHint = '<p class="weekend-hint">Te faltan ' + (60 - total) + '′ para el mínimo semanal.</p>';
      }
    }

    container.innerHTML =
      '<span class="today-kind" style="background:' + plan.color + ';color:#fff;opacity:0.92">' +
        escapeHtml(plan.badge) + '</span>' +
      promptBlock +
      '<div class="task-row' + (speakDone ? " done" : "") + '" id="taskSpeak" role="button" tabindex="0">' +
        '<span class="task-check">' + (speakDone ? "✓" : "") + '</span>' +
        '<span class="task-label">' + escapeHtml(plan.task) + '<small>' + escapeHtml(plan.hint) + '</small></span>' +
        speakOpen +
      '</div>' +
      '<div class="task-row' + (ankiDone ? " done" : "") + '" id="taskAnki" role="button" tabindex="0">' +
        '<span class="task-check">' + (ankiDone ? "✓" : "") + '</span>' +
        '<span class="task-label">Tarjetas 5′<small>' + escapeHtml(srsHintText()) + '</small></span>' +
        '<button class="task-open" id="srsOpenBtn" type="button">repasar →</button>' +
      '</div>' +
      '<div class="stepper">' +
        '<button id="stepDown" aria-label="Restar 1 minuto">−</button>' +
        '<div class="today-total"><span id="todayTotalVal">' + entry.min + '′</span><small>hoy</small></div>' +
        '<button id="stepUp" aria-label="Sumar 1 minuto">+</button>' +
      '</div>' +
      '<button class="minimo-link' + (minimoDone ? " done" : "") + '" id="taskMinimo">' +
        (minimoDone ? "✓ Día mínimo hecho — 3′" : "¿Sin tiempo? Día mínimo viable — 3′ (5 tarjetas + 1 frase en voz alta)") +
      '</button>' +
      weekendHint;

    if (picked) {
      document.getElementById("otroBtn").addEventListener("click", function () {
        bumpOffset(dateStr);
        renderToday(container);
      });
    }

    if (plan.timer) {
      var ROUNDS = [240, 180, 120];
      var roundIdx = 0, remaining = ROUNDS[0], ticking = null;
      var roundEl = document.getElementById("cuatroRound");
      var clockEl = document.getElementById("cuatroClock");
      var btnEl = document.getElementById("cuatroBtn");
      function fmt(s) { return Math.floor(s / 60) + ":" + ("0" + (s % 60)).slice(-2); }
      function showRound() {
        roundEl.textContent = "Ronda " + (roundIdx + 1) + " de 3 — " + fmt(ROUNDS[roundIdx]);
        clockEl.textContent = fmt(remaining);
      }
      function endRound() {
        clearInterval(ticking); ticking = null;
        if (navigator.vibrate) navigator.vibrate(200);
        roundIdx++;
        if (roundIdx >= ROUNDS.length) {
          roundEl.textContent = "¡Hecho! Marca la tarea.";
          clockEl.textContent = "✓";
          btnEl.style.display = "none";
        } else {
          remaining = ROUNDS[roundIdx];
          showRound();
          btnEl.textContent = "Empezar ronda " + (roundIdx + 1);
        }
      }
      btnEl.addEventListener("click", function () {
        if (ticking) { endRound(); return; } // running => skip to next round
        btnEl.textContent = "Terminar ronda →";
        ticking = setInterval(function () {
          remaining--;
          if (remaining <= 0) { endRound(); return; }
          clockEl.textContent = fmt(remaining);
        }, 1000);
      });
      showRound();
      btnEl.textContent = "Empezar";
    }

    function toggleTask(taskName) {
      applyTaskToggle(dateStr, kind, taskName);
      renderToday(container);
      renderMeter(document.getElementById("meterCard"));
      renderHeatmap(document.getElementById("heatmapCard"));

    ["taskSpeak", "taskAnki", "taskMinimo"].forEach(function (id) {

      });

    // "abrir →" links open their app without toggling the row
    container.querySelectorAll(".task-open").forEach(function (a) {

    document.getElementById("stepUp").addEventListener("click", function () {

  /* ---------- 6c. Weekly meter ---------- */
  function renderMeter(container) {
    var weekIdx = weekIndexOf(today);
    var total = weekTotalMinutes(weekIdx);
    var MAX = 90, FLOOR = 60;
    var pct = Math.min(100, (total / MAX) * 100);

    container.innerHTML =
      '<h2>Meta semanal</h2>' +

        '" aria-valuenow="' + total + '" aria-label="Minutos practicados esta semana">' +

        '<div class="meter-tick" style="left:' + tickPct + '%"></div>' +
      '</div>' +
      '<div class="meter-labels"><span>0′</span><span>60′ mínimo</span><span>90′ meta</span></div>';
  }

  /* ---------- 6d. Heatmap ---------- */
  function minutesLevel(min) {
    if (!min || min <= 0) return 0;
    if (min <= 7) return 1;
    if (min <= 14) return 2;
    return 3;
  }
  function renderHeatmap(container) {
    var cols = "";
    var curWeek = weekIndexOf(today);
    for (var w = 0; w < TOTAL_WEEKS; w++) {
      var monday = addDays(WEEK0_MONDAY, w * 7);
      var isPhaseEdge = (w > 0 && weekPhase(w - 1) !== weekPhase(w));
      var colCells = "";
      for (var d = 0; d < 7; d++) {
        var date = addDays(monday, d);
        var dateStr = isoDate(date);
        var isFuture = date > today;
        var isOutOfRange = date < START_DATE || date > END_DATE;
        var min = 0;
        var e = DATA.days[dateStr];
        if (e) min = e.min || 0;
        var lvl = minutesLevel(min);
        var cls = ["heat-cell"];
        if (lvl > 0) cls.push("lvl" + lvl);
        if (isFuture || isOutOfRange) cls.push("future");
        var label = date.toLocaleDateString("es-ES", { day: "numeric", month: "short", year: "numeric" });
        colCells += '<button class="' + cls.join(" ") + '" data-date="' + dateStr + '" data-min="' + min +
          '" aria-label="' + escapeHtml(label) + ", " + min + ' minutos"' +
          (isFuture || isOutOfRange ? " disabled" : "") + '></button>';
      }
      var colCls = "heatmap-col" + (isPhaseEdge ? " phase-edge" : "");
      cols += '<div class="' + colCls + '">' + colCells + '</div>';
    }
    container.innerHTML =
      '<h2>Histórico</h2>' +
      '<div class="heatmap-scroll"><div class="heatmap-grid" id="heatGrid">' + cols + '</div></div>' +
      '<div class="heatmap-legend">Menos ' +
        '<span class="heat-cell"></span><span class="heat-cell lvl1"></span>' +
        '<span class="heat-cell lvl2"></span><span class="heat-cell lvl3"></span> Más' +
      '</div>' +
      '<p class="heat-detail" id="heatDetail" aria-live="polite">Toca un día para ver el detalle.</p>';

    document.getElementById("heatGrid").querySelectorAll(".heat-cell").forEach(function (cell) {
      cell.addEventListener("click", function () {
        var dateStr = cell.getAttribute("data-date");
        var min = cell.getAttribute("data-min");
        var d = new Date(dateStr + "T00:00:00");
        var label = d.toLocaleDateString("es-ES", { day: "numeric", month: "long", year: "numeric" });
        document.getElementById("heatDetail").textContent = label + " · " + min + "′";
      });
    });
    requestAnimationFrame(function () {
      var scroll = container.querySelector(".heatmap-scroll");
      var targetCol = scroll.querySelectorAll(".heatmap-col")[curWeek];
      if (targetCol && targetCol.scrollIntoView) {
        targetCol.scrollIntoView({ inline: "center", block: "nearest" });
      }
    });
  }

  /* ============================================================
     7. SYNC (GitHub contents API)
     ============================================================ */
  var SYNC_PATH = "data/stats.json";
  var lastKnownSha = null;
  var syncTimer = null;

  function apiBase(owner, repo) {
    return "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + SYNC_PATH;
  }

  function b64EncodeUnicode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64DecodeUnicode(str) {
    return decodeURIComponent(escape(atob(str)));
  }

  function mergeData(remote, local) {
    var merged = { version: 1, updated: new Date().toISOString(), days: {}, srs: {}, srsNew: { date: null, count: 0 } };
    var allDates = {};
    Object.keys((remote && remote.days) || {}).forEach(function (k) { allDates[k] = true; });
    Object.keys((local && local.days) || {}).forEach(function (k) { allDates[k] = true; });
    Object.keys(allDates).forEach(function (dateStr) {
      var r = remote && remote.days && remote.days[dateStr];
      var l = local && local.days && local.days[dateStr];
      if (r && l) merged.days[dateStr] = (r.min || 0) >= (l.min || 0) ? r : l;
      else merged.days[dateStr] = r || l;
    });

    // ---- srs: per-card, keep the state with the higher reps (tie -> later due date) ----
    var allCardIds = {};
    Object.keys((remote && remote.srs) || {}).forEach(function (k) { allCardIds[k] = true; });
    Object.keys((local && local.srs) || {}).forEach(function (k) { allCardIds[k] = true; });
    Object.keys(allCardIds).forEach(function (cardId) {
      var r = remote && remote.srs && remote.srs[cardId];
      var l = local && local.srs && local.srs[cardId];
      if (r && l) {
        if ((r.reps || 0) !== (l.reps || 0)) {
          merged.srs[cardId] = (r.reps || 0) > (l.reps || 0) ? r : l;
        } else {
          merged.srs[cardId] = (r.due || "") >= (l.due || "") ? r : l;
        }
      } else {
        merged.srs[cardId] = r || l;
      }
    });

    // ---- srsNew: keep the one with the later date (tie -> higher count) ----
    var rNew = (remote && remote.srsNew) || null;
    var lNew = (local && local.srsNew) || null;
    if (rNew && lNew) {
      if ((rNew.date || "") !== (lNew.date || "")) {
        merged.srsNew = (rNew.date || "") > (lNew.date || "") ? rNew : lNew;
      } else {
        merged.srsNew = (rNew.count || 0) >= (lNew.count || 0) ? rNew : lNew;
      }
    } else {
      merged.srsNew = rNew || lNew || { date: null, count: 0 };
    }

    return merged;
  }
  // Deviation (documented): dataEquals now also compares srs/srsNew, not just
  // days. It gates the "push merged data back after pull" decision in
  // syncPull() — if it only checked .days, a pull that changed SRS state but
  // left .days untouched (the common case: grading cards) would wrongly
  // decide nothing changed and skip pushing the merge back, silently
  // breaking two-way SRS sync.
  function dataEquals(a, b) {
    return JSON.stringify(a.days) === JSON.stringify(b.days) &&
      JSON.stringify(a.srs || {}) === JSON.stringify(b.srs || {}) &&
      JSON.stringify(a.srsNew || {}) === JSON.stringify(b.srsNew || {});
  }

  function syncPull(showStatus) {
    var pat = getPAT();
    if (!pat) { renderBanners(); return Promise.resolve(); }
    var or = detectOwnerRepo();
    if (!or.owner || !or.repo) {
      setRedBanner("owner/repo no configurados. Añádelos en ajustes.");
      return Promise.resolve();
    }
    return fetch(apiBase(or.owner, or.repo), {
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + pat
      }
    }).then(function (resp) {
      if (resp.status === 404) {
        // file doesn't exist yet — nothing to merge, will be created on first push
        lastKnownSha = null;
        clearRedBanner();
        if (showStatus) setSyncStatus("No existe data/stats.json todavía — se creará al guardar.");
        return;
      }
      if (!resp.ok) {
        return resp.text().then(function (t) {
          throw new Error(resp.status + " " + resp.statusText + " — " + t.slice(0, 200));
        });
      }
      return resp.json().then(function (json) {
        lastKnownSha = json.sha;
        var remote;
        try { remote = JSON.parse(b64DecodeUnicode(json.content.replace(/\n/g, ""))); }
        catch (e) { throw new Error("No se pudo leer data/stats.json (JSON inválido)."); }
        var merged = mergeData(remote, DATA);
        var changed = !dataEquals(merged, DATA) || !dataEquals(merged, remote);
        DATA = merged;
        localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
        clearRedBanner();
        render();
        if (!dataEquals(merged, remote)) {
          return syncPush(showStatus);
        } else if (showStatus) {
          setSyncStatus("Sincronizado correctamente. (" + Object.keys(DATA.days).length + " días)");
        }
      });
    }).catch(function (err) {
      setRedBanner(err.message || String(err));
      if (showStatus) setSyncStatus("Error: " + (err.message || String(err)));
    });
  }

  function syncPush(showStatus) {
    var pat = getPAT();
    if (!pat) return Promise.resolve();
    var or = detectOwnerRepo();
    if (!or.owner || !or.repo) {
      setRedBanner("owner/repo no configurados. Añádelos en ajustes.");
      return Promise.resolve();
    }
    var body = {
      message: "sync stats",
      content: b64EncodeUnicode(JSON.stringify(DATA, null, 2))
    };
    if (lastKnownSha) body.sha = lastKnownSha;
    return fetch(apiBase(or.owner, or.repo), {
      method: "PUT",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + pat,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    }).then(function (resp) {
      if (!resp.ok) {
        return resp.text().then(function (t) {
          throw new Error(resp.status + " " + resp.statusText + " — " + t.slice(0, 200));
        });
      }
      return resp.json().then(function (json) {
        if (json.content && json.content.sha) lastKnownSha = json.content.sha;
        clearRedBanner();
        if (showStatus) setSyncStatus("Guardado en GitHub correctamente.");
      });
    }).catch(function (err) {
      setRedBanner(err.message || String(err));
      if (showStatus) setSyncStatus("Error: " + (err.message || String(err)));
    });
  }

  // 20s rather than 2s: each push is a real commit to the repo, and grading
  // a card fires a save. A short debounce turned one review session into a
  // dozen commits. Nothing is at risk while we wait — localStorage already
  // has the data, and an unsent change syncs on the next open.
  function scheduleSync() {
    if (!getPAT()) return;
    if (syncTimer) clearTimeout(syncTimer);
    syncTimer = setTimeout(function () { syncTimer = null; syncPush(false); }, 20000);
  }
  // Flush a pending sync when the app is backgrounded or closed, so a
  // session's work lands promptly instead of waiting for the next launch.
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "hidden" && syncTimer) {
      clearTimeout(syncTimer);
      syncTimer = null;
      syncPush(false);
    }
  });

  function setSyncStatus(msg) {
    var el = document.getElementById("syncStatus");
    if (el) el.textContent = msg;
  }

  /* ============================================================
     8. SETTINGS DRAWER
     ============================================================ */

  var overlay = document.getElementById("drawerOverlay");

  function openDrawer() {

    document.getElementById("repoInput").value = SETTINGS.repo || "";

    syncPull(true);
  });

  document.getElementById("exportBtn").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(DATA, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "camino-stats-" + isoDate(today) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById("importInput").addEventListener("change", function (ev) {
    var file = ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var imported = JSON.parse(reader.result);
        DATA = mergeData(imported, DATA);
        localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
        setSyncStatus("Importado y fusionado (" + Object.keys(DATA.days).length + " días).");
        render();
        scheduleSync();
      } catch (e) {
        setSyncStatus("Error al importar: JSON inválido.");
      }

    ev.target.value = "";

  /* ============================================================
     9. SRS FLASHCARD REVIEWER (built-in spaced repetition, SM-2 lite)
     Replaces the old external AnkiWeb link. Deck comes from cards.js
     (global CARDS array, generated by deck/export_cards_js.py). SRS
     state lives in DATA.srs / DATA.srsNew (synced like everything else).
     ============================================================ */
  var CARDS_BY_ID = {};
  if (CARDS_OK) {
    for (var _ci = 0; _ci < CARDS.length; _ci++) CARDS_BY_ID[CARDS[_ci].id] = CARDS[_ci];
  }
  var NEW_CARDS_PER_DAY = 10;

  function srsNewCountToday(dateStr) {
    return (DATA.srsNew && DATA.srsNew.date === dateStr) ? (DATA.srsNew.count || 0) : 0;
  }
  function bumpSrsNew(dateStr) {
    if (!DATA.srsNew || DATA.srsNew.date !== dateStr) {
      DATA.srsNew = { date: dateStr, count: 1 };
    } else {
      DATA.srsNew.count = (DATA.srsNew.count || 0) + 1;
    }
  }

  // Keeps a session near the 5-minute budget. Due cards always take
  // priority; new cards only fill what's left, so a review backlog can
  // never be starved by new material.
  var MAX_SESSION_CARDS = 24;

  // Deterministic per-day shuffle (mulberry32 on a date+salt seed). Same
  // order all day so closing and reopening is stable, different order each
  // day so cards aren't learned as a fixed sequence.
  function shuffledByDay(ids, dateStr, salt) {
    var seed = 0;
    var s = dateStr + (salt || "");
    for (var i = 0; i < s.length; i++) seed = (seed * 31 + s.charCodeAt(i)) >>> 0;
    var out = ids.slice();
    for (var j = out.length - 1; j > 0; j--) {
      seed = (seed + 0x6D2B79F5) >>> 0;
      var t = seed;
      t = Math.imul(t ^ (t >>> 15), t | 1) >>> 0;
      t = (t ^ (t + Math.imul(t ^ (t >>> 7), t | 61))) >>> 0;
      var k = ((t ^ (t >>> 14)) >>> 0) % (j + 1);
      var tmp = out[j]; out[j] = out[k]; out[k] = tmp;
    }
    return out;
  }

  // Evenly interleaves new cards through the due cards instead of showing
  // all reviews first — interleaved practice beats blocked practice for
  // retention, and it stops a session from opening with a wall of repeats.
  function interleave(due, fresh) {
    if (!fresh.length) return due.slice();
    if (!due.length) return fresh.slice();
    var out = [], step = (due.length + fresh.length) / fresh.length, next = 0, fi = 0;
    for (var i = 0; i < due.length; i++) {
      while (fi < fresh.length && out.length >= next) { out.push(fresh[fi++]); next += step; }
      out.push(due[i]);
    }
    while (fi < fresh.length) out.push(fresh[fi++]);
    return out;
  }

  // Pure preview (no mutation) of what a session would contain right now —
  // used for the "X para hoy" hint on the task row.
  function srsQueuePreview() {
    if (!CARDS_OK) return { due: 0, newAvail: 0, total: 0 };
    var dateStr = isoDate(today);
    var due = 0, newCount = 0;
    for (var i = 0; i < CARDS.length; i++) {
      var st = DATA.srs[CARDS[i].id];
      if (st) { if (st.due <= dateStr) due++; }
      else newCount++;
    }
    var dailyCap = Math.max(0, NEW_CARDS_PER_DAY - srsNewCountToday(dateStr));
    var roomCap = Math.max(0, MAX_SESSION_CARDS - due);
    var newAvail = Math.min(newCount, dailyCap, roomCap);
    return { due: due, newAvail: newAvail, total: due + newAvail };
  }
  function srsHintText() {
    if (!CARDS_OK) return "tarjetas no disponibles";
    var counts = srsQueuePreview();
    return counts.total > 0 ? (counts.total + " para hoy") : "✓ al día";
  }

  function categoryOf(card) {
    var t = card.tags || [];
    for (var i = 0; i < t.length; i++) {
      if (t[i].indexOf("phase") !== 0) return t[i];
    }
    return "otro";
  }
  // Round-robin across categories so every day's new cards are a mix.
  // Straight phase-then-file order front-loads all 25 vosotros conjugation
  // cards, which meant ~2.5 days of pure conjugation drilling before the
  // first vocab card ever appeared. Phase still orders the pool (earlier
  // phases drain first), category just rotates within it.
  function orderNewCards(pool) {
    var byCat = {}, cats = [];
    pool.forEach(function (id) {
      var cat = categoryOf(CARDS_BY_ID[id]);
      if (!byCat[cat]) { byCat[cat] = []; cats.push(cat); }
      byCat[cat].push(id);
    });
    var out = [], remaining = pool.length;
    while (remaining > 0) {
      for (var i = 0; i < cats.length; i++) {
        var list = byCat[cats[i]];
        if (list.length) { out.push(list.shift()); remaining--; }
      }
    }
    return out;
  }

  // Builds today's session queue: all due cards, then new cards (earlier
  // phases first, rotating through categories), capped at the remaining
  // new-card allowance for today. Introducing a new card into the queue
  // immediately creates its initial SRS state (due = today) and bumps the
  // daily new-card counter, and persists both — so reopening the reviewer
  // later the same day (without grading) won't re-introduce or re-count it;
  // it'll simply show up as "due" instead of "new".
  function buildSrsQueue() {
    var dateStr = isoDate(today);
    var due = [];
    var newByPhase = { 1: [], 2: [], 3: [] };
    for (var i = 0; i < CARDS.length; i++) {
      var c = CARDS[i];
      var st = DATA.srs[c.id];
      if (st) {
        if (st.due <= dateStr) due.push(c.id);
      } else {
        newByPhase[c.phase].push(c.id);
      }
    }
    var dailyCap = Math.max(0, NEW_CARDS_PER_DAY - srsNewCountToday(dateStr));
    var roomCap = Math.max(0, MAX_SESSION_CARDS - due.length);
    var newOrdered = orderNewCards(newByPhase[1])
      .concat(orderNewCards(newByPhase[2]))
      .concat(orderNewCards(newByPhase[3]))
      .slice(0, Math.min(dailyCap, roomCap));
    var introduced = false;
    newOrdered.forEach(function (id) {
      DATA.srs[id] = { reps: 0, iv: 0, ease: 250, lapses: 0, due: dateStr };
      bumpSrsNew(dateStr);
      introduced = true;
    });
    if (introduced) saveData(DATA);
    return interleave(shuffledByDay(due, dateStr, "due"), newOrdered);
  }

  // ±10% jitter on intervals of 4+ days. Without it, cards introduced on
  // the same day march in lockstep forever and every review lands as one
  // big clump; this spreads the daily load out.
  function fuzzInterval(iv) {
    if (iv < 4) return iv;
    return Math.max(2, Math.round(iv * (0.9 + Math.random() * 0.2)));
  }

  // SM-2-lite grading, days granularity, relative to `today` (never
  // new Date()) so the ?d= debug override works throughout.
  function gradeSrsCard(cardId, grade) {
    var dateStr = isoDate(today);
    var st = DATA.srs[cardId] || { reps: 0, iv: 0, ease: 250, lapses: 0, due: dateStr };
    if (grade === "again") {
      st.ease = Math.max(130, st.ease - 20);
      st.iv = 1;
      st.lapses = (st.lapses || 0) + 1;
      st.due = isoDate(addDays(today, 1));
    } else if (grade === "good") {
      if (st.reps === 0) st.iv = 1;
      else if (st.reps === 1) st.iv = 3;
      else st.iv = fuzzInterval(Math.round(st.iv * st.ease / 100));
      st.due = isoDate(addDays(today, st.iv));
      st.reps += 1;
    } else if (grade === "easy") {
      // A brand-new card marked Fácil jumps straight to 4 days (Anki's
      // default "easy interval"); an established one gets its usual
      // multiplier with a 1.3 bonus.
      st.iv = st.reps === 0
        ? 4
        : fuzzInterval(Math.max(2, Math.round((st.iv || 1) * st.ease / 100 * 1.3)));
      st.ease += 15;
      st.due = isoDate(addDays(today, st.iv));
      st.reps += 1;
    }
    DATA.srs[cardId] = st;
    saveData(DATA);
  }

  var srsSession = null; // { queue: [ids], pos, reviewed, showingAnswer }

  function openSrsOverlay() {
    if (!CARDS_OK) return;
    var queue = buildSrsQueue();
    srsSession = { queue: queue, pos: 0, reviewed: 0, showingAnswer: false, stepped: {} };
    var overlay = document.getElementById("srsOverlay");
    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden", "false");
    renderSrsStep();
  }
  function closeSrsOverlay() {
    var overlay = document.getElementById("srsOverlay");
    overlay.classList.remove("open");
    overlay.setAttribute("aria-hidden", "true");
    srsSession = null;
    var todayCard = document.getElementById("todayCard");
    if (todayCard) renderToday(todayCard); // refresh the "X para hoy" hint
  }

  // Reuses the same toggle logic as the manual task rows (applyTaskToggle),
  // so auto-marking "anki" done applies the identical mutual-exclusion with
  // "minimo" and the identical minute bookkeeping.
  function markAnkiDoneIfNeeded() {
    var dateStr = isoDate(today);
    var e = dayEntry(dateStr);
    if ((e.tasks || []).indexOf("anki") > -1) return; // already logged
    var kind = todaysPlan(today.getDay()).kind;
    applyTaskToggle(dateStr, kind, "anki");
    var meterCard = document.getElementById("meterCard");
    var heatmapCard = document.getElementById("heatmapCard");
    if (meterCard) renderMeter(meterCard);
    if (heatmapCard) renderHeatmap(heatmapCard);
  }

  function renderSrsStep() {
    var body = document.getElementById("srsBody");
    var counter = document.getElementById("srsCounter");
    if (!srsSession || srsSession.pos >= srsSession.queue.length) {
      counter.textContent = "";
      var reviewedCount = srsSession ? srsSession.reviewed : 0;
      markAnkiDoneIfNeeded();
      body.innerHTML =
        '<div class="srs-done">' +
        '<div class="big">¡Hecho!</div>' +
        '<p>' + reviewedCount + ' tarjeta' + (reviewedCount === 1 ? "" : "s") +
          ' repasada' + (reviewedCount === 1 ? "" : "s") + '.</p>' +
        '<button class="srs-done-close" id="srsDoneCloseBtn">Cerrar</button>' +
        '</div>';
      document.getElementById("srsDoneCloseBtn").addEventListener("click", closeSrsOverlay);
      return;
    }
    var remaining = srsSession.queue.length - srsSession.pos;
    counter.textContent = remaining + " restante" + (remaining === 1 ? "" : "s");
    srsSession.showingAnswer = false;
    var cardId = srsSession.queue[srsSession.pos];
    var card = CARDS_BY_ID[cardId];

    if (!card) {
      // Fail loudly rather than silently skip: this would mean stored SRS
      // state references a card id that no longer exists in cards.js.
      body.innerHTML =
        '<p style="color:#e0292f">⚠ Tarjeta "' + escapeHtml(cardId) + '" no existe en cards.js.</p>' +
        '<button class="srs-show-btn" id="srsSkipBtn">Siguiente</button>';
      document.getElementById("srsSkipBtn").addEventListener("click", function () {
        srsSession.pos++;
        renderSrsStep();
      });
      return;
    }

    body.innerHTML =
      '<p class="srs-front">' + escapeHtml(card.front) + '</p>' +
      '<button class="srs-show-btn" id="srsShowBtn">Mostrar respuesta</button>';
    document.getElementById("srsShowBtn").addEventListener("click", revealSrsAnswer);
  }

  function revealSrsAnswer() {
    if (!srsSession || srsSession.showingAnswer) return;
    srsSession.showingAnswer = true;
    var cardId = srsSession.queue[srsSession.pos];
    var card = CARDS_BY_ID[cardId];
    var body = document.getElementById("srsBody");
    body.innerHTML =
      '<p class="srs-front">' + escapeHtml(card.front) + '</p>' +
      '<p class="srs-back">' + escapeHtml(card.back) + '</p>' +
      (card.extra ? '<p class="srs-extra">' + escapeHtml(card.extra) + '</p>' : "") +
      '<div class="srs-grades">' +
        '<button class="srs-grade-btn srs-grade-again" id="srsAgainBtn">Otra vez</button>' +
        '<button class="srs-grade-btn srs-grade-good" id="srsGoodBtn">Bien</button>' +
        '<button class="srs-grade-btn srs-grade-easy" id="srsEasyBtn">Fácil</button>' +
      '</div>';
    document.getElementById("srsAgainBtn").addEventListener("click", function () { answerSrs("again"); });
    document.getElementById("srsGoodBtn").addEventListener("click", function () { answerSrs("good"); });
    document.getElementById("srsEasyBtn").addEventListener("click", function () { answerSrs("easy"); });
  }

  // Re-inserts a card a few positions ahead so it comes back after a short
  // gap (a handful of other cards) rather than immediately or at the very
  // end of the session.
  function requeueAhead(cardId, gap) {
    var target = Math.min(srsSession.pos + gap, srsSession.queue.length);
    srsSession.queue.splice(target, 0, cardId);
  }

  function answerSrs(grade) {
    if (!srsSession || !srsSession.showingAnswer) return;
    var cardId = srsSession.queue[srsSession.pos];
    var st = DATA.srs[cardId];

    // Learning step: a brand-new card graded Bien is shown once more later
    // in the same session before it graduates to a 1-day interval. Seeing a
    // new item twice in its first sitting is a large first-encoding win —
    // one exposure then a day's gap is where most forgetting happened.
    if (grade === "good" && st && st.reps === 0 && !srsSession.stepped[cardId]) {
      srsSession.stepped[cardId] = true;
      requeueAhead(cardId, 6);
      srsSession.pos++;
      renderSrsStep();
      return;
    }

    gradeSrsCard(cardId, grade);
    srsSession.reviewed++;
    if (grade === "again") {
      // must be seen again this session until graded Bien/Fácil, and it has
      // to re-earn its learning step
      srsSession.stepped[cardId] = false;
      requeueAhead(cardId, 5);
    }
    srsSession.pos++;
    renderSrsStep();
  }

  document.getElementById("srsCloseBtn").addEventListener("click", closeSrsOverlay);

  // Keyboard nicety (desktop): Space = show answer, 1/2/3 = grades.
  document.addEventListener("keydown", function (ev) {
    if (!srsSession) return;
    var overlay = document.getElementById("srsOverlay");
    if (!overlay || !overlay.classList.contains("open")) return;
    if (ev.key === " " || ev.code === "Space") {
      if (!srsSession.showingAnswer) { ev.preventDefault(); revealSrsAnswer(); }
      return;
    }
    if (srsSession.showingAnswer) {
      if (ev.key === "1") answerSrs("again");
      else if (ev.key === "2") answerSrs("good");
      else if (ev.key === "3") answerSrs("easy");
    }
  });

  /* ============================================================
     10. INIT
     ============================================================ */
  renderBanners();
  render();
  if (getPAT()) syncPull(false);

})();
</script>
</body>
</html>
